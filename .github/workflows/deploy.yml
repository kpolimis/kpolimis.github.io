name: Deploy Quarto site

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python (conda)
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: blog
          python-version: "3.11"
          auto-activate-base: false

      - name: Install Python dependencies
        shell: bash -el {0}
        run: pip install jupyter nbformat

      - name: Render site
        shell: bash -el {0}
        run: quarto render

      - name: Push to kpolimis.github.io
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone --depth 1 --branch master \
            https://${GH_TOKEN}@github.com/kpolimis/kpolimis.github.io.git \
            built_website
          cd built_website
          rsync -av --delete --exclude='.git' ../_site/ .
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet || \
            git commit -m "Deploy from ${GITHUB_SHA::7}" && \
            git push origin master
